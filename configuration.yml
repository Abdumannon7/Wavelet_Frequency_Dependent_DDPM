dataset_params:
  csv_path: "BraTS20 Training Metadata.csv"
  data_root: "../input/brats2020-training-data/BraTS2020_training_data/content/data/"
  
  # Filtering Thresholds
  min_slice: 40
  max_slice: 124
  tumor_threshold: 100
  
  # Training Target ('significant_tumor' or 'no_tumor')
  target_class: "significant_tumor"
  
  # DataLoader params
  batch_size: 128
  shuffle_bool: true
  num_workers: 4
  channel_index: 3


diffusion_params:
  timesteps: 1000
  beta_begin: 0.0001
  beta_end: 0.02

model_params:
  image_channels: 1
  image_size: 28
  down_channels: [32, 64, 128, 256]
  mid_channels: [256, 256, 128]
  down_sample: [True, True, False]
  time_emb_dim: 128
  num_down_layers: 2
  num_mid_layers: 2
  num_up_layers: 2
  num_heads: 4


train_params:
  output_folder: 'default'
  shuffle_bool: true
  batch_size: 128
  num_epochs: 300
  samples: 100
  rows: 10
  learning_rate: 0.0001
  shuffle_bool: true
  checkpoint_file: 'ddpm_wavelet.pth'
