dataset_params:
  train_path: 'chest_xray/train'
  test_path: 'chest_xray/test'
  target_class: 'NORMAL'
  image_size: 64
  num_workers: 4


diffusion_params:
  timesteps: 1000
  beta_begin: 0.0001
  beta_end: 0.02

model_params:
  image_channels: 1
  image_size: 32
  down_channels: [32, 64, 128, 256]
  mid_channels: [256, 256, 128]
  down_sample: [True, True, False]
  time_emb_dim: 128
  num_down_layers: 2
  num_mid_layers: 2
  num_up_layers: 2
  num_heads: 4


train_params:
  output_folder: 'default'
  shuffle_bool: true
  batch_size: 32
  num_epochs: 300
  samples: 16
  rows: 4
  learning_rate: 0.0001
  checkpoint_file: 'ddpm_wavelet.pth'
